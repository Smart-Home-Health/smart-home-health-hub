version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shh_db
    environment:
      POSTGRES_USER: shh_user
      POSTGRES_PASSWORD: shh_dev_pass
      POSTGRES_DB: shh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shh_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shh-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shh_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://shh_user:shh_dev_pass@db:5432/shh
      SERIAL_PORT: ${SERIAL_PORT:-/dev/ttyUSB0}
      SERIAL_BAUD_RATE: ${SERIAL_BAUD_RATE:-9600}
    volumes:
      - ./backend:/app
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shh-network
    # Uncomment if you need access to serial devices (Raspberry Pi)
    # devices:
    #  - /dev/ttyUSB0:/dev/ttyUSB0
    #  - /dev/ttyACM0:/dev/ttyACM0
    # privileged: true
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shh_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    networks:
      - shh-network
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  app_data:

networks:
  shh-network:
    driver: bridge
